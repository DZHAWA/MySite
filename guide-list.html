    <script>
        // База данных текстов для гайдов
        const guideData = {
            basics: {
                icon: "🎲",
                title: "Основы DnD 5e",
                content: `
                    <p>Добро пожаловать в мир Dungeons & Dragons! В основе всей игры лежит простое правило взаимодействия игрока и Мастера.</p>
                    <h3>Главный кубик — d20</h3>
                    <p>Когда ваш персонаж пытается сделать что-то сложное (взломать замок, обмануть стражника, перепрыгнуть расщелину), вы бросаете 20-гранный кубик.</p>
                    <div class="info-block"><strong>Формула любого действия:</strong> Бросок d20 + Модификатор характеристики + Бонус мастерства (если применим) против Сложности (КС), заданной Мастером.</div>
                    <h3>Три столпа игры</h3>
                    <p>1. <strong>Социальное взаимодействие:</strong> Разговоры с NPC, допросы, торговля и дипломатия.</p>
                    <p>2. <strong>Исследование мира:</strong> Поиск ловушек, чтение древних свитков, путешествия по диким землям.</p>
                    <p>3. <strong>Боевые столкновения:</strong> Тактические сражения на арене или поле боя.</p>
                `
            },
            character: {
                icon: "🛡️",
                title: "Создание персонажа",
                content: `
                    <p>Создание вашего первого героя — это увлекательный процесс, состоящий из пяти простых шагов.</p>
                    <h3>Шаг 1: Концепция и Раса</h3>
                    <p>Кто вы? Гордый эльф-маг, суровый дварф-воин или хитрый плут-полурослик? Раса определяет ваши врожденные способности, ночное зрение и стартовые языки.</p>
                    <h3>Шаг 2: Выбор Класса</h3>
                    <p>Класс — это профессия и призвание вашего персонажа. Он определяет, что вы умеете делать лучше всего в бою и при исследовании мира.</p>
                    <h3>Шаг 3: Определение характеристик</h3>
                    <p>У каждого персонажа есть 6 основных параметров:</p>
                    <ul>
                        <li><strong>Сила (STR)</strong> — физическая мощь и атлетика.</li>
                        <li><strong>Ловкость (DEX)</strong> — скорость, реакция, скрытность и защита.</li>
                        <li><strong>Телосложение (CON)</strong> — здоровье и выносливость.</li>
                        <li><strong>Интеллект (INT)</strong> — логика, память, знание магии и истории.</li>
                        <li><strong>Мудрость (WIS)</strong> — интуиция, внимательность, связь с природой.</li>
                        <li><strong>Харизма (CHA)</strong> — сила личности, убеждение, обман, запугивание.</li>
                    </ul>
                `
            },
            combat: {
                icon: "⚔️",
                title: "Боевая система",
                content: `
                    <p>Когда переговоры заходят в тупик, начинается бой. Боевая система в DnD 5e является пошаговой.</p>
                    <h3>Инициатива</h3>
                    <p>В начале боя все участники бросают d20 + модификатор Ловкости. Это определяет очередность ходов от наибольшего к наименьшему. Ход идет по кругу.</p>
                    <h3>Что можно сделать в свой ход?</h3>
                    <p>Ваш ход состоит из трех основных ресурсов:</p>
                    <ol>
                        <li><strong>Движение:</strong> Вы можете переместиться на расстояние, равное вашей скорости (обычно 30 футов / 6 клеток).</li>
                        <li><strong>Действие:</strong> Самая важная часть. Потратьте его на Атаку, Заклинание, Рывок, Отступление или Помощь другу.</li>
                        <li><strong>Бонусное действие:</strong> Особые быстрые приемы, доступные только по свойствам класса или заклинаниям (например, атака вторым оружием).</li>
                    </ol>
                `
            },
            roleplay: {
                icon: "🎭",
                title: "Отыгрыш и Ролеплей",
                content: `
                    <p>Ролевой отыгрыш (Roleplay) — это то, что отличает DnD от обычных настольных стратегий. Это процесс принятия решений от лица вашего персонажа.</p>
                    <h3>Как начать ролеплеить новичку?</h3>
                    <p>Не обязательно говорить театральным голосом или владеть актерским мастерством. Достаточно следовать двум правилам:</p>
                    <ul>
                        <li><strong>Думайте как персонаж:</strong> Если ваш воин — трусливый наемник, он не бросится спасать крестьян бесплатно, даже если лично вы (игрок) этого хотите.</li>
                        <li><strong>Описывайте от третьего лица:</strong> Если стесняетесь говорить цитатами, просто скажите: "Мой персонаж угрюмо смотрит на трактирщика и требует скидку, намекая на свой топор". Это тоже отличный отыгрыш!</li>
                    </ul>
                `
            },
            magic: {
                icon: "🧙‍♂️",
                title: "Школа Магии",
                content: `
                    <p>Магия в мире DnD разнообразна и работает по системе заклинаний и магических ячеек.</p>
                    <h3>Ячейки заклинаний (Spell Slots)</h3>
                    <p>Представьте ячейки как патроны или обойму мага. Чтобы сотворить заклинание 1-го уровня, вы должны потратить одну ячейку 1-го уровня. После долгого отдыха все ячейки полностью восстанавливаются.</p>
                    <h3>Заговоры (Cantrips)</h3>
                    <p>Это простейшие фокусы (0 уровень), которые заклинатель выучил настолько хорошо, что может использовать их бесконечно, не тратя ячейки.</p>
                    <h3>Разница между классами</h3>
                    <p>— <strong>Волшебник:</strong> Учит магию по книгам и формулам через интеллект.</p>
                    <p>— <strong>Чародей:</strong> Обладает врожденным талантом или магической кровью дракона/хаоса.</p>
                    <p>— <strong>Колдун:</strong> Заключил контракт с могущественным покровителем (демоном, феей) в обмен на силы.</p>
                `
            },
            dm: {
                icon: "👑",
                title: "Советы Мастеру (DM)",
                content: `
                    <p>Быть Дмитрием (Dungeon Master) — это не значит играть ПРОТИВ игроков. Ваша цель — создать крутое приключение вместе с ними.</p>
                    <h3>Золотые правила начинающего DM:</h3>
                    <p>1. <strong>Правило "Да, но...":</strong> Не говорите игрокам строгое "Нет", если они придумали безумный план. Позвольте им бросить кубик, но предупредите о последствиях.</p>
                    <p>2. <strong>Не перегружайте себя подготовкой:</strong> Подготовьте локацию, 3-4 NPC и пару видов монстров. Игроки все равно пойдут туда, куда вы не ожидали — будьте готовы импровизировать.</p>
                    <p>3. <strong>Главное — веселье:</strong> Если какое-то мелкое правило из книги душит динамику игры, забудьте про него в этот вечер ради эпичности момента.</p>
                `
            }
        };

        // Функция для отрисовки контента на основе URL
        function loadGuide() {
            // Получаем параметр id из ссылки (например, ?id=combat)
            const urlParams = new URLSearchParams(window.location.search);
            let guideId = urlParams.get('id');

            // Если id нет или он не существует в базе, открываем "basics" по умолчанию
            if (!guideId || !guideData[guideId]) {
                guideId = 'basics';
            }

            const currentGuide = guideData[guideId];

            // Подставляем данные на страницу
            document.getElementById('guide-icon').textContent = currentGuide.icon;
            document.getElementById('guide-title').textContent = currentGuide.title;
            document.getElementById('guide-text').innerHTML = currentGuide.content;

            // Обновляем заголовок вкладки в браузере
            document.title = currentGuide.title + " | DnD Online";

            // Подсвечиваем активный пункт меню в левой панели
            const activeLink = document.getElementById('link-' + guideId);
            if (activeLink) {
                activeLink.classList.add('active');
            }
        }

        // Запуск при загрузке страницы
        window.onload = loadGuide;
    </script>
</body>
